version: "3.9"

services:
  # PHP-FPM (уже с PDO)
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - lab5_network
  
  # веб-сервер Nginx
  php:
    build: .
    volumes:
      - ./www:/var/www/html
    networks:
      - lab5_network
  
  # база данных MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: food_service
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - lab5_network
  
  # adminer
  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - lab5_network

networks:
  lab5_network:
    driver: bridge